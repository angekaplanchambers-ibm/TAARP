<h3>What the user is doing</h3>
<p>Operator sees incoming alerts. The agent ingests run logs and audit events and
drift detection results, groups correlated signals across workspaces. Correlation
happens automatically - the agent groups related signals within
10 seconds of ingestion, surfacing a single incident from what would
otherwise be a wall of disconnected alerts.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Alert list (25% left):</strong> Chronological feed of raw
    alerts. Each row shows timestamp, source subsystem, and severity
    badge. Correlated alerts collapse under a group header.</li>
  <li><strong>Signal detail with correlation table (45% center):</strong>
    Expanded view of the selected alert group. Correlation table maps
    each signal to its source, timestamp delta, and match reason.</li>
  <li><strong>Agent chat (30% right):</strong> Agent narrates correlation
    logic - which signals matched, why they grouped, and what subsystems
    are involved.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Click an alert row to expand the correlation group in the center panel.</li>
  <li>Review the correlation table to verify grouping logic.</li>
  <li>Confirm grouping to promote the cluster to an incident, or ungroup
    a mismatched signal back to the raw queue.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Three-panel layout keeps the alert queue visible while the operator
    investigates a specific group - no context switching.</li>
  <li>Correlation is automatic. The agent groups within 10 seconds;
    the operator confirms rather than constructs.</li>
  <li>Ungroup action is always available so the operator retains final
    authority over what constitutes a single incident.</li>
</ul>
</div>
`,$m=`<div class="ann-block">
<h3>What the user is doing</h3>
<p>Operator selects an incident from the queue, reviews the triage
summary, and accepts auto-assignment. The agent has already classified
severity, identified affected subsystems, and recommended an escalation
path based on historical pattern match.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Incident table (30-70% depending on mode):</strong> Queue of
    open incidents. Columns show ID, severity, subsystem, age, and
    assignee. Table compresses to 30% when a detail panel is open.</li>
  <li><strong>Detail panel with severity/signals/subsystems (40% center):</strong>
    Triage summary for the selected incident. Shows correlated signal
    count, severity justification, affected subsystems, and escalation
    recommendation.</li>
  <li><strong>Agent chat (30% right):</strong> Agent explains the triage
    rationale - why this severity, which historical incidents matched,
    and the recommended next step.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Click an incident row to open the detail panel; table compresses
    to make room.</li>
  <li>Review the escalation recommendation and severity classification.</li>
  <li>Click Analyze to accept triage and proceed to root cause analysis.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Table-to-detail transition collapses the table rather than replacing
    it, so the operator keeps queue context while triaging.</li>
  <li>Escalation recommendation is based on historical pattern match -
    the agent cites similar past incidents, not abstract rules.</li>
  <li>Single Analyze action moves forward. No ambiguous multi-button
    toolbar at the triage stage.</li>
</ul>
</div>
`,Bm=`<div class="ann-block">
<h3>What the user is doing</h3>
<p>Agent presents ranked root causes with confidence scores. The operator
reviews evidence chains, confirms the most likely cause, and reviews
the remediation playbook. Every mutating step in the playbook has a
rollback command defined before the operator can request approval.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Incident context (25% left):</strong> Summary card showing
    incident ID, severity, affected subsystems, and timeline of
    correlated signals for quick reference.</li>
  <li><strong>Root cause ranking / Remediation plan (45% center):</strong>
    Top section lists ranked causes with confidence bars and expandable
    evidence chains. Bottom section shows the remediation playbook with
    sequential steps, parameters, and risk markers.</li>
  <li><strong>Agent chat (30% right):</strong> Agent walks through its
    reasoning - which log entries, metrics, and patterns led to each
    confidence score.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Review confidence bars for each candidate root cause.</li>
  <li>Expand evidence chains to see the supporting log entries and metrics.</li>
  <li>Click a cause to select it and load the corresponding playbook.</li>
  <li>Review playbook steps, edit parameters if needed.</li>
  <li>Click Request Approval to send the plan to the Incident Commander.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Confidence bars use filled/empty blocks in grayscale, not color -
    accessible and readable on any display.</li>
  <li>High-risk steps are marked with a triangle glyph and require
    Incident Commander approval before execution.</li>
  <li>Every mutating step must have a rollback command defined. The
    playbook is incomplete without reversal paths.</li>
</ul>
</div>
`,Mm=`<div class="ann-block">
<h3>What the user is doing</h3>
<p>Incident Commander reviews and approves the remediation plan. A
15-minute approval window prevents the request from blocking
indefinitely. The IC reads the plan, confirms high-risk steps, and
either approves with a reason or rejects to send the operator back
to remediation.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Approval metadata with countdown (30% left):</strong> Shows
    requester, incident severity, submission time, and a countdown
    timer for the 15-minute approval window. Escalation target
    displayed below the timer.</li>
  <li><strong>Plan review read-only (40% center):</strong> The remediation
    playbook rendered in read-only mode. High-risk steps highlighted
    with triangle glyphs. Each step shows the command, target
    subsystem, and rollback path.</li>
  <li><strong>Agent chat (30% right):</strong> Agent summarizes the plan
    rationale, flags which steps carry risk, and notes any conditions
    that must hold for the plan to succeed.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Review each high-risk step and its rollback command.</li>
  <li>Enter a reason in the text field (required for audit trail).</li>
  <li>Check the confirmation checkbox and click Approve, or click Reject
    to return to remediation.</li>
  <li>View pre-conditions that must hold before execution begins.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Approval checkbox is deliberate friction - the IC must explicitly
    confirm, preventing accidental approval.</li>
  <li>15-minute timer prevents approval from blocking indefinitely.
    Timeout triggers automatic escalation to Infrastructure Architect.</li>
  <li>Rejection returns to the remediation step, not the beginning of
    the workflow. Progress is preserved.</li>
  <li>Read-only plan view prevents the IC from editing steps inline -
    changes require a new remediation cycle.</li>
</ul>
</div>
`,Dm=`<div class="ann-block">
<h3>What the user is doing</h3>
<p>Agent executes playbook steps sequentially via terraform CLI. The operator
monitors real-time progress as each step runs, validates, and advances.
Failure halts execution immediately - the operator chooses whether to
retry, rollback, or escalate.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Execution summary with progress bar (30% left):</strong>
    Shows incident ID, total steps, completed count, and a segmented
    progress bar. Current step highlighted. Elapsed time and estimated
    remaining time displayed below.</li>
  <li><strong>Step list with status glyphs and output (40% center):</strong>
    Each step shows a status glyph (pending, running, passed, failed),
    the command being executed, and expandable monospace output. The
    running step auto-expands to show live output.</li>
  <li><strong>Agent chat (30% right):</strong> Agent narrates each step
    as it executes - what it ran, what the output means, and whether
    validation passed.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Watch steps complete in real time as glyphs update from pending
    to running to passed.</li>
  <li>Expand any completed step to review its output.</li>
  <li>On failure, choose a recovery path: retry the step, rollback all
    completed steps, or escalate to Infrastructure Architect.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Sequential execution with validation between steps. Each step
    must pass before the next begins.</li>
  <li>Failure halts immediately. No partial execution of remaining steps.</li>
  <li>Rollback executes in reverse order of completed steps, using the
    rollback commands defined in the playbook.</li>
  <li>Event stream provides monospace output so the operator can verify
    exactly what ran and what it returned.</li>
</ul>
</div>
`,Wm=`<div class="ann-block">
<h3>What the user is doing</h3>
<p>Agent runs verification checks automatically after execution completes.
The operator reviews check results, confirms resolution, and closes
the incident. A 120-second quiet window confirms no new correlated
alerts before closure is permitted.</p>
</div>

<div class="ann-block">
<h3>Screen breakdown</h3>
<ul>
  <li><strong>Incident summary / Closure metadata (30% left):</strong>
    Final incident card showing severity, duration, root cause, and
    remediation steps executed. Closure fields include resolver,
    timestamp, and IC sign-off status for severity-1/2 incidents.</li>
  <li><strong>Verification checklist / Incident timeline (40% center):</strong>
    Top section lists automated verification checks with pass/fail
    glyphs. Bottom section shows the full incident timeline from
    first alert through closure.</li>
  <li><strong>Agent chat (30% right):</strong> Agent reports verification
    results, confirms the quiet window passed, and prompts the
    operator to close.</li>
</ul>
</div>

<div class="ann-block">
<h3>Key interactions</h3>
<ul>
  <li>Review verification check results - each shows what was tested
    and the outcome.</li>
  <li>Click Close Incident to finalize (requires IC sign-off for
    severity-1/2).</li>
  <li>Review the full incident timeline from correlation through
    resolution.</li>
</ul>
</div>

<div class="ann-block">
<h3>Design decisions</h3>
<ul>
  <li>Verification is automatic. The agent runs checks without operator
    prompting - the operator reviews results, not procedures.</li>
  <li>120-second quiet window confirms no new correlated alerts before
    closure is permitted. Recurrence restarts the window.</li>
  <li>Severity-1/2 incidents require IC sign-off to close. Lower
    severities close with operator confirmation alone.</li>
  <li>Full timeline is written to the Splunk audit trail on closure -
    every action, approval, and verification captured.</li>
</ul>
</div>

\x3C!-- The Job -->
<section id="pt-the-job" class="story">
  <div class="story-label">The Problem</div>
  <div class="story-body">
    <p>When a terraform apply fails on production, the platform engineer opens HCP Terraform UI, the AWS console, Datadog, and Slack - four tools, three browser tabs. They manually correlate run logs with drift detection results and audit trail entries. Pattern matching that a senior engineer does in 8 minutes takes a junior engineer 25 minutes.</p>
    <p>38 minutes average MTTR for P1/P2 run failures. 30 of those minutes are information gathering.</p>
  </div>
</section>

\x3C!-- Observe-Correlate-Act -->
<section id="pt-approach" class="story">
  <div class="story-label">Observe-Correlate-Act</div>
  <div class="story-body">
    <p>An AI agent ingests HCP Terraform audit log events, run logs, drift detection results, and notification webhooks. Correlates in seconds. Presents ranked root causes with evidence. Suggests remediation runbooks. Engineer approves, agent executes via terraform CLI. Target: under 5 minutes for triage, 50% MTTR reduction.</p>
  </div>
</section>

\x3C!-- Product Principles -->
<section id="pt-principles" class="principles">
  <h2 class="principles-heading">Product Principles</h2>
  <p class="principles-desc">Three design decisions that shape every stage of this journey.</p>
  <div class="principles-grid">
    <div class="principle-card">
      <div class="principle-num">01</div>
      <div class="principle-title">Human Gate on Every Mutation</div>
      <div class="principle-body">No terraform apply executes without explicit approval and a mandatory reason field.</div>
    </div>
    <div class="principle-card">
      <div class="principle-num">02</div>
      <div class="principle-title">Evidence Before Conclusion</div>
      <div class="principle-body">Every AI root cause links to the raw run logs, state diffs, and audit trail entries that support it. The engineer can drill from summary to source in one click.</div>
    </div>
    <div class="principle-card">
      <div class="principle-num">03</div>
      <div class="principle-title">Every Failure Has a Recovery</div>
      <div class="principle-body">Apply failure triggers rollback via state versioning. Verification failure returns to root cause analysis. Approval timeout escalates.</div>
    </div>
  </div>
</section>

\x3C!-- Jobs to Be Done -->
<section id="pt-jtbd" class="flow-section">
  <h2>Jobs to Be Done</h2>
  <p class="section-desc">Three jobs that drive the incident response journey. Each maps to a product principle.</p>
  <div class="rollback-options">
    <div class="rollback-card">
      <div class="tag-recommended">Principle 01</div>
      <h4>Correlated signals in one view</h4>
      <p><strong>When</strong> an incident fires, <strong>I want</strong> correlated signals in one view <strong>so that</strong> I don't spend 20 minutes switching between HCP Terraform UI, AWS console, and Datadog.</p>
      <p style="margin-top:0.6rem; font-size:0.8rem; color:var(--z-text-helper);">Today: the engineer opens four tools across three browser tabs and manually correlates timestamps. Run logs are structured, notification webhooks are not. Cross-referencing takes 8-25 minutes depending on experience.</p>
    </div>
    <div class="rollback-card">
      <div class="tag-recommended">Principle 02</div>
      <h4>Verifiable evidence for every root cause</h4>
      <p><strong>When</strong> the AI suggests a root cause, <strong>I want</strong> to see the raw run logs and state diffs <strong>so that</strong> I can verify the analysis before approving any remediation.</p>
      <p style="margin-top:0.6rem; font-size:0.8rem; color:var(--z-text-helper);">Trust requires transparency. Each ranked cause links to the specific run logs, drift detection results, and audit trail entries that support it. The engineer validates before acting.</p>
    </div>
    <div class="rollback-card">
      <div class="tag-recommended">Principle 03</div>
      <h4>Clear recovery when remediation fails</h4>
      <p><strong>When</strong> a remediation step fails, <strong>I want</strong> clear recovery options <strong>so that</strong> I'm not stuck with an unknown system state.</p>
      <p style="margin-top:0.6rem; font-size:0.8rem; color:var(--z-text-helper);">Three recovery paths: retry the failed step, roll back all completed steps in reverse order, or escalate to the next tier with full context preserved. No dead ends.</p>
    </div>
  </div>
</section>

<section id="pt-execution-flow" class="flow-section">
  <h2>Execution Flow</h2>
  <p class="section-desc">The agent observes and correlates autonomously. A human gate separates analysis from action. No remediation runs without explicit operator approval.</p>
  <div class="flow-phases">
    <div class="flow-phase-label phase-1">Observe &amp; Correlate</div>
    <div class="flow-row">

      <div class="flow-arrow">&rarr;</div>

      <div class="flow-arrow">&rarr;</div>

    </div>

    </div>
  </div>
</section>

\x3C!-- State Machine -->
<section id="pt-state-machine" class="flow-section">
  <h2>Incident State Machine</h2>
  <p class="section-desc">The incident moves through discrete states. Transitions are deterministic. Any failure forks to recovery or escalation - never a dead end.</p>
  <div class="state-grid">
    <div class="state-cell"><div class="state-name">detected</div><div class="state-desc">Alert received</div></div>
    <div class="state-cell"><div class="state-name">correlating</div><div class="state-desc">Ingesting signals</div></div>
    <div class="state-cell"><div class="state-name">triaging</div><div class="state-desc">Severity assessed</div></div>
    <div class="state-cell"><div class="state-name">analyzing</div><div class="state-desc">Root cause ranking</div></div>
    <div class="state-cell"><div class="state-name">remediation_suggested</div><div class="state-desc">Runbook selected</div></div>
    <div class="state-cell active-state"><div class="state-name">pending_approval</div><div class="state-desc">Awaiting engineer</div></div>
    <div class="state-cell"><div class="state-name">approved</div><div class="state-desc">Engineer confirmed</div></div>
    <div class="state-cell"><div class="state-name">executing</div><div class="state-desc">Runbook running</div></div>
    <div class="state-cell"><div class="state-name">verifying</div><div class="state-desc">Health checks</div></div>
    <div class="state-cell"><div class="state-name">resolved</div><div class="state-desc">Incident closed</div></div>
    <div class="state-cell"><div class="state-name">escalated</div><div class="state-desc">Manual intervention</div></div>
    <div class="state-cell"><div class="state-name">failed</div><div class="state-desc">Recovery required</div></div>
  </div>
</section>

\x3C!-- Recovery Options -->
<section id="pt-recovery" class="flow-section">
  <h2>Recovery Options</h2>
  <p class="section-desc">When a remediation step fails, the engineer chooses one of three paths. Incident state is preserved across all recovery modes.</p>
  <div class="rollback-options">
    <div class="rollback-card">
      <div class="tag-recommended">Recommended</div>
      <h4>Retry Step</h4>
      <p>Single step failed. Fix the issue and retry just that step. Preceding steps are preserved. The runbook resumes from the failure point.</p>
    </div>
    <div class="rollback-card">
      <h4>Full Rollback</h4>
      <p>Execute rollback commands for all completed steps in reverse order. Return to remediation suggestion for a revised plan. System returns to pre-remediation state.</p>
    </div>
    <div class="rollback-card">
      <h4>Escalate</h4>
      <p>Route to Infrastructure Architect for manual intervention. Incident state preserved. Full context attached - correlation data, root cause analysis, and partial execution log.</p>
    </div>
  </div>
</section>

<section id="pt-bridging-data" class="flow-section">
  <h2>Bridging Data Contract</h2>
  <p class="section-desc">Three identifiers thread through the entire incident lifecycle. The Incident ID is the durable key. The Correlation Key links signals across sources. The Approval Token authorizes remediation execution and expires after 15 minutes.</p>
